<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
    background: radial-gradient(circle at top, #020024, #000);
    color:#fff;
}
.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #ffffff;
    box-shadow:0 0 10px #ffffff;
}
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index:1000;
}
nav h2{color:#ffffff}
nav a{color:#fff;margin:0 10px;text-decoration:none}
nav a:hover{color:#00ffc3}

.hero{
    height:60vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
.hero h1{
    font-size:50px;
    background:linear-gradient(45deg,#00ffc3,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}
.hero p{color:#aaa;margin-top:10px}

.section{padding:80px 20px;text-align:center}

.contact-box{
    max-width:500px;
    margin:auto;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,195,0.2);
}

.contact-box input,
.contact-box textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#111;
    color:#fff;
}

.contact-box button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#00ffc3;
    cursor:pointer;
    transition:0.3s;
}

.contact-box button:hover{
    transform:scale(1.1);
}

.social{
    margin-top:30px;
}

.social a{
    display:inline-block;
    margin:10px;
    padding:10px 20px;
    border:1px solid #00ffc3;
    border-radius:20px;
    color:#00ffc3;
    text-decoration:none;
    transition:0.3s;
}

.social a:hover{
    background:#00ffc3;
    color:#000;
}

footer{
    text-align:center;
    padding:20px;
    background:#000;
    margin-top:50px;
}

/* background slider */
.bg-slider{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
.bg-slider img{
    position:absolute;width:100%;height:100%;object-fit:cover;opacity:0;
    animation:slide 15s infinite;
}
.bg-slider img:nth-child(1){animation-delay:0s}
.bg-slider img:nth-child(2){animation-delay:5s}
.bg-slider img:nth-child(3){animation-delay:10s}

@keyframes slide{
0%{opacity:0}
10%{opacity:1}
30%{opacity:1}
40%{opacity:0}
100%{opacity:0}
}

</style>
</head>
