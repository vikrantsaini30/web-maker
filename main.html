*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
    background: radial-gradient(circle at top, #020024, #000);
    color:#fff;
    overflow-x:hidden;
}
.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #ffffff;
    box-shadow:0 0 10px #ffffff;
}
/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 40px;
    background:rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(10px);
    z-index:1000;
}
nav h2{color:#ffffff}
nav a{color:#fff;margin:0 10px;text-decoration:none;transition:0.5s}
nav a:hover{color:#00ffc3}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}
.hero h1{
    font-size:70px;
    background:linear-gradient(45deg,#00ffc3,#00aaff);
    -webkit-background-clip:text;
    color:transparent;
}
.hero p{margin-top:10px;color:#aaa}
.hero button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#00ffc3;
    cursor:pointer;
    transition:0.2s;
}
.hero button:hover{transform:scale(1.1)}

/* SECTION */
.section{padding:100px 20px;text-align:center}
.section h2{margin-bottom:40px;font-size:35px}

/* CARDS */
.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255, 255, 255, 0.1);
    padding:25px;
    margin:15px;
    width:260px;
    border-radius:20px;
    transition:0.4s; 
}
.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 20px #00ffc3;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#000;
    margin-top:50px;
}



/* BACKGROUND SLIDER */
.bg-slider{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden; 
    background: rgba(0,0,0,0.7); /* darkness control */
    
}
.bg-slider img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation:slide 15s infinite;
}
.bg-slider img:nth-child(1){animation-delay:0s}
.bg-slider img:nth-child(2){animation-delay:5s}
.bg-slider img:nth-child(3){animation-delay:10s}

@keyframes slide{
    0%{opacity:0}
    10%{opacity:1}
    30%{opacity:1}
    40%{opacity:0}
    100%{opacity:0}
}

</style>
